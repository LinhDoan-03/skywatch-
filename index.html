<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyWatch – Tableau de bord météo</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <!-- Leaflet.js (carte réelle) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Nút démo présentation + toggle aperçu fond -->
  <div style="position:fixed; bottom:20px; right:20px; z-index:10000; display:flex; gap:8px; align-items:center;">
    <button id="demoBtn" onclick="toggleDemo()" style="
      background:rgba(0,0,0,0.55); backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.15); border-radius:10px;
      color:#fff; font-size:0.78rem; padding:7px 13px; cursor:pointer;
      transition: background 0.3s, border-color 0.3s;
    ">▶ Présentation</button>
    <button onclick="toggleBgPreview()" style="
      background:rgba(0,0,0,0.55); backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.15); border-radius:10px;
      color:#fff; font-size:0.78rem; padding:7px 13px; cursor:pointer;
    ">🎨 Aperçu</button>
  </div>

  <!-- Panneau aperçu -->
  <div id="bgPreview" style="
    position:fixed; bottom:60px; right:20px; z-index:9999;
    background:rgba(0,0,0,0.55); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.15); border-radius:14px;
    padding:10px 14px; display:none; flex-direction:column; gap:6px;
    font-family:'DM Sans',sans-serif; font-size:0.78rem;
  ">
    <div style="color:rgba(255,255,255,0.5); font-size:0.7rem; text-align:center; margin-bottom:2px;">🎨 Aperçu du fond</div>
    <button onclick="previewBg('time-black')"     style="background:#000;color:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;">⬛ Noir</button>
    <button onclick="previewBg('time-night')"     style="background:linear-gradient(90deg,#0a0e1a,#1a1040);color:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;">🌙 Nuit</button>
    <button onclick="previewBg('time-dawn')"      style="background:linear-gradient(90deg,#7c3a2d,#e8845c);color:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;">🌅 Aube</button>
    <button onclick="previewBg('time-morning')"   style="background:linear-gradient(90deg,#1e40af,#60a5fa);color:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;">☀️ Matin</button>
    <button onclick="previewBg('time-noon')"      style="background:linear-gradient(90deg,#0369a1,#38bdf8);color:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;">🌞 Midi</button>
    <button onclick="previewBg('time-afternoon')" style="background:linear-gradient(90deg,#1d4ed8,#fcd34d);color:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;">🌤️ Après-midi</button>
    <button onclick="previewBg('time-sunset')"    style="background:linear-gradient(90deg,#7c3aed,#f97316);color:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;">🌇 Coucher</button>
    <button onclick="previewBg('time-dusk')"      style="background:linear-gradient(90deg,#1e1b4b,#7c3aed);color:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;">🌆 Crépuscule</button>
  </div>

  <script>
    function previewBg(cls) {
      manualBg = true;
      document.body.className = cls;
    }
    function toggleBgPreview() {
      const p = document.getElementById('bgPreview');
      const isClosing = p.style.display !== 'none';
      p.style.display = isClosing ? 'none' : 'flex';
      if (isClosing) {
        manualBg = false;
        updateSky();
      }
    }
  </script>

  <!-- Effet étoiles -->
  <div class="stars" id="stars"></div>

  <div class="app">

    <!-- ── EN-TÊTE ── -->
    <header>
      <div class="logo">🌤 <span>Sky</span>Watch</div>
      <div class="time-badge" id="timeBadge">--:--</div>
    </header>

    <!-- ── LAYOUT 2 COLONNES ── -->
    <div class="app-layout">

      <!-- ═══ COLONNE GAUCHE ═══ -->
      <div class="col-left">

        <!-- Recherche -->
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Rechercher une ville..." value="Paris">
          <button class="btn" onclick="searchCity()">🔍 Rechercher</button>
        </div>

        <!-- Suggestions rapides -->
        <div class="search-hint">
          Essayez :
          <span onclick="quickSearch('paris')">Paris</span>
          <span onclick="quickSearch('lyon')">Lyon</span>
          <span onclick="quickSearch('marseille')">Marseille</span>
          <span onclick="quickSearch('bordeaux')">Bordeaux</span>
          <span onclick="quickSearch('nice')">Nice</span>
          <span onclick="quickSearch('toulouse')">Toulouse</span>
          <span onclick="quickSearch('nantes')">Nantes</span>
          <span onclick="quickSearch('rennes')">Rennes</span>
          <span onclick="quickSearch('lille')">Lille</span>
          <span onclick="quickSearch('orleans')">Orléans</span>
          <span onclick="quickSearch('strasbourg')">Strasbourg</span>
          <span onclick="quickSearch('montpellier')">Montpellier</span>
        </div>

        <!-- Historique récent -->
        <div class="recent-tags" id="recentTags"></div>

        <!-- Météo actuelle + graphique -->
        <div class="main-weather">
          <div class="card current-card fade-in" id="currentCard">
            <div class="city-name" id="cityName">Paris, FR</div>
            <div class="weather-desc" id="weatherDesc">Nuages épars</div>
            <div class="icon-temp-row">
              <div class="weather-icon-big" id="weatherIcon">⛅</div>
              <div class="temp-big" id="tempBig">14°C</div>
            </div>
            <div class="stats-grid">
              <div class="stat-box">
                <div class="stat-icon">💧</div>
                <div class="stat-label">Humidité</div>
                <div class="stat-val" id="humidity">55%</div>
              </div>
              <div class="stat-box">
                <div class="stat-icon">💨</div>
                <div class="stat-label">Vent</div>
                <div class="stat-val" id="wind">6 m/s</div>
              </div>
              <div class="stat-box">
                <div class="stat-icon">🌡️</div>
                <div class="stat-label">Moy. 24h</div>
                <div class="stat-val" id="feelsLike">13°C</div>
              </div>
            </div>
          </div>

          <div class="card chart-card fade-in">
            <div class="card-title">Température sur 24 heures</div>
            <div class="chart-wrap">
              <canvas id="hourlyChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Prévisions 5 jours -->
        <div class="section">
          <div class="section-header">📅 Prévisions sur 5 jours</div>
          <div class="forecast-row" id="forecastRow"></div>
        </div>


      </div><!-- end col-left -->

      <!-- ═══ COLONNE DROITE (sticky) ═══ -->
      <div class="col-right">

        <!-- Carte météo Leaflet -->
        <div class="card" style="padding:0; overflow:hidden; border-radius:var(--radius);">
          <div id="leafletMap" style="width:100%; height:340px; border-radius:var(--radius);"></div>
        </div>

        <!-- Info ville sur carte -->
        <div id="mapInfo" class="card map-info">
          <button class="map-info-close" onclick="closeMapInfo()">✕</button>
          <div id="mapInfoContent"></div>
        </div>

        <!-- Comparaison des températures -->
        <div class="card" style="padding:24px;">
          <div class="card-title">🌡️ Comparaison des températures</div>
          <div class="bar-compare" id="barCompare"></div>
        </div>

      </div><!-- end col-right -->

    </div><!-- end app-layout -->

  </div><!-- end .app -->

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
